name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Replace Supabase secrets in index.html
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" index.html
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" index.html

      - name: Verify secrets were injected
        run: |
          if grep -q "__SUPABASE_URL__" index.html; then
            echo "ERROR: SUPABASE_URL placeholder still found in index.html!"
            exit 1
          fi
          if grep -q "__SUPABASE_ANON_KEY__" index.html; then
            echo "ERROR: SUPABASE_ANON_KEY placeholder still found in index.html!"
            exit 1
          fi
          echo "✅ Secrets successfully injected"

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
